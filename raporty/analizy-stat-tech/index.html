<!doctype html>
<html lang="pl">
<head>
<script>
  const BASE = "/";
  function url(path){
    return BASE + String(path || "").replace(/^\/+/, "");
  }
</script>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ACE – Analizy Statystyczno-Techniczne</title>

<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<style>
:root{
  --bg:#0b1220;
  --card:#0f1a33;
  --border:rgba(255,255,255,.10);
  --text:#eaf0ff;
  --muted:rgba(234,240,255,.72);
  --muted2:rgba(234,240,255,.55);
  --accent:#7dd3fc;
  --accent2:#a78bfa;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  --radius:16px;

  /* żółty "Aktualizacja" jak NOWE (dziś/wczoraj) */
  --todayYellow: rgba(250,204,21,.95);
  --todayYellowText: #0b1220;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--text);
  background:
    radial-gradient(1200px 600px at 10% 0%, rgba(125,211,252,.14), transparent 60%),
    radial-gradient(900px 500px at 90% 10%, rgba(167,139,250,.12), transparent 55%),
    var(--bg);
}

.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:28px 18px 60px;
}

h1{
  margin:0;
  font-size:26px;
  font-weight:900;
}

.subtitle{
  margin-top:6px;
  font-size:14px;
  color:var(--muted);
}

/* === PRZYCISK POWROT DO PANELU === */
.backRow{
  margin:10px 0 18px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.backBtn{
  display:inline-flex;
  gap:8px;
  align-items:center;
  padding:8px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.14);
  background: rgba(255,255,255,.06);
  color: rgba(234,240,255,.92);
  font-size:13px;
  text-decoration:none;
  box-shadow: 0 10px 24px rgba(0,0,0,.25);
}
.backBtn:hover{ background: rgba(255,255,255,.10); }

.divider{
  height:1px;
  background:linear-gradient(
    90deg,
    rgba(125,211,252,.45),
    rgba(167,139,250,.35),
    rgba(255,255,255,.08)
  );
  margin:26px 0;
}

.sectionTitle{
  font-size:18px;
  font-weight:900;
  margin-bottom:14px;
  letter-spacing:.3px;
}

.grid-3{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}
.grid-2{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}
@media(max-width:900px){
  .grid-3{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
  .grid-3,.grid-2{grid-template-columns:1fr}
}

.card{
  display:block;
  text-decoration:none;
  color:inherit;
  border:1px solid var(--border);
  background:rgba(255,255,255,.04);
  border-radius:var(--radius);
  padding:14px;
  box-shadow:var(--shadow);
  transition:.15s ease;
}
.card:hover{
  background:rgba(255,255,255,.07);
  transform:translateY(-1px);
}

.badges{
  display:flex;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px;
  flex-wrap:wrap;
  align-items:center;
}

.badge{
  font-size:12px;
  padding:5px 9px;
  border-radius:999px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.06);
  color:var(--muted2);
  white-space:nowrap;
}

/* NOWE (gradient) */
.badgeNew{
  font-size:11px;
  padding:5px 9px;
  border-radius:999px;
  font-weight:900;
  letter-spacing:.3px;
  color:#081018;
  background:linear-gradient(90deg,#7dd3fc,#a78bfa);
  box-shadow:0 6px 18px rgba(125,211,252,.35);
  white-space:nowrap;
}

/* ŻÓŁTA RAMKA dla "Aktualizacja: data" gdy NOWE (dziś/wczoraj) */
.badgeUpdToday{
  font-size:12px;
  padding:5px 10px;
  border-radius:999px;
  font-weight:950;
  border:1px solid rgba(250,204,21,.70);
  background: var(--todayYellow);
  color: var(--todayYellowText);
  box-shadow: 0 10px 24px rgba(0,0,0,.20);
  white-space:nowrap;
}

/* wyśrodkowanie żółtej daty w wierszu badge */
.badges .badgeUpdToday{
  margin-left:auto;
  margin-right:auto;
}

.cardTitle{
  font-size:15px;
  font-weight:900;
  margin:0 0 6px;
}
.cardDesc{
  font-size:13px;
  color:var(--muted);
  margin:0;
}
</style>
</head>

<body>
<div class="wrap">

  <h1>Analizy Statystyczno-Techniczne</h1>
  <div class="subtitle">
    Waluty, zboża, śruty i energia – uporządkowane analizy ACE
  </div>

  <div class="backRow">
    <a class="backBtn" href="/index.html">← Panel główny</a>
  </div>

  <div class="divider"></div>

  <div class="sectionTitle">💱 WALUTY</div>
  <div class="grid-3" id="sec-waluty"></div>

  <div class="divider"></div>

  <div class="sectionTitle">🌾 ZBOŻA</div>
  <div class="grid-3" id="sec-zboza"></div>

  <div class="divider"></div>

  <div class="sectionTitle">🧩 ŚRUTY</div>
  <div class="grid-2" id="sec-sruty"></div>

  <div class="divider"></div>

  <div class="sectionTitle">⚡ ENERGIA</div>
  <div class="grid-3" id="sec-energia"></div>

  <div class="divider"></div>

  <div class="sectionTitle">📊 WSKAŹNIKI</div>
  <div class="grid-3" id="sec-wskazniki"></div>

</div>

<script>
function parseUpdated(iso){
  if(!iso) return -Infinity;
  const t = Date.parse(iso + "T00:00:00");
  return isNaN(t) ? -Infinity : t;
}

function todayIsoLocal(){
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

// zostawiamy "NOWE" jak było: dziś / wczoraj (<= 1.5 dnia)
function isNew(dateStr){
  if(!dateStr) return false;
  const d = new Date(dateStr + "T00:00:00");
  if(isNaN(d)) return false;
  const now = new Date();
  const diffDays = (now - d) / (1000*60*60*24);
  return diffDays <= 1.5;
}

// format 2026-02-04 -> 04.02.2026
function fmtDatePL(iso){
  if(!iso) return "";
  const p = String(iso).split("-");
  if(p.length !== 3) return String(iso);
  return `${p[2]}.${p[1]}.${p[0]}`;
}

function renderBadges(updated){
  const isnew = isNew(updated);
  const newBadge = isnew ? `<span class="badgeNew">NOWE</span>` : "";
  const dateBadge = updated
    ? (isnew
        ? `<span class="badgeUpdToday">Aktualizacja: ${fmtDatePL(updated)}</span>`
        : `<span class="badge">Aktualizacja: ${fmtDatePL(updated)}</span>`)
    : `<span class="badge">Aktualizacja: —</span>`;

  return `${newBadge}${dateBadge}`;
}

function card(r){
  const href = url(r.path);

  return `
    <a class="card js-card" href="${href}" data-source="${href}" data-updated="${r.updated || ""}">
      <div class="badges">
        ${renderBadges(r.updated || "")}
      </div>
      <p class="cardTitle">${r.name}</p>
      <p class="cardDesc">${r.description || ""}</p>
    </a>`;
}

function normalizeDate(raw){
  if(!raw) return null;

  const value = String(raw).trim().replace(/\s+/g, " ");
  let m;

  m = value.match(/^(\d{4})[.\-\/](\d{2})[.\-\/](\d{2})$/);
  if(m){
    return { iso: `${m[1]}-${m[2]}-${m[3]}` };
  }

  m = value.match(/^(\d{2})[.\-\/](\d{2})[.\-\/](\d{4})$/);
  if(m){
    return { iso: `${m[3]}-${m[2]}-${m[1]}` };
  }

  return null;
}

function extractDateFromHtml(htmlText){
  const parser = new DOMParser();
  const doc = parser.parseFromString(htmlText, "text/html");

  const directCandidates = [];

  const metaSelectors = [
    'meta[name="report-updated"]',
    'meta[name="updated"]',
    'meta[name="last-updated"]',
    'meta[property="report-updated"]'
  ];

  metaSelectors.forEach(selector => {
    const el = doc.querySelector(selector);
    if(el && el.content) directCandidates.push(el.content);
  });

  const dataSelectors = [
    '[data-report-updated]',
    '[data-updated]',
    '.reportDate',
    '.updateDate',
    '.updated',
    '.aktualizacja'
  ];

  dataSelectors.forEach(selector => {
    const el = doc.querySelector(selector);
    if(!el) return;

    const attrDate = el.getAttribute('data-report-updated') || el.getAttribute('data-updated');
    if(attrDate) directCandidates.push(attrDate);
    if(el.textContent) directCandidates.push(el.textContent.trim());
  });

  for(const candidate of directCandidates){
    const parsed = normalizeDate(candidate);
    if(parsed) return parsed;
  }

  const bodyText = (doc.body ? doc.body.textContent : htmlText)
    .replace(/\u00A0/g, " ")
    .replace(/\s+/g, " ")
    .trim();

  const patterns = [
    /Aktualizacja\s*:?\s*(\d{2}[.\-\/]\d{2}[.\-\/]\d{4})/i,
    /Aktualizacja\s*:?\s*(\d{4}[.\-\/]\d{2}[.\-\/]\d{2})/i,
    /Updated\s*:?\s*(\d{2}[.\-\/]\d{2}[.\-\/]\d{4})/i,
    /Updated\s*:?\s*(\d{4}[.\-\/]\d{2}[.\-\/]\d{2})/i
  ];

  for(const pattern of patterns){
    const match = bodyText.match(pattern);
    if(match && match[1]){
      const parsed = normalizeDate(match[1]);
      if(parsed) return parsed;
    }
  }

  const genericMatch = bodyText.match(/(\d{2}[.\-\/]\d{2}[.\-\/]\d{4}|\d{4}[.\-\/]\d{2}[.\-\/]\d{2})/);
  if(genericMatch && genericMatch[1]){
    const parsed = normalizeDate(genericMatch[1]);
    if(parsed) return parsed;
  }

  return null;
}

async function hydrateMissingDates(){
  const cards = [...document.querySelectorAll(".js-card")];
  const todayISO = todayIsoLocal();

  await Promise.all(cards.map(async cardEl => {
    const existingUpdated = cardEl.dataset.updated || "";
    if(existingUpdated) return;

    const source = cardEl.dataset.source;
    if(!source) return;

    try{
      const separator = source.includes("?") ? "&" : "?";
      const response = await fetch(`${source}${separator}v=${Date.now()}`, { cache: "no-store" });
      if(!response.ok) return;

      const htmlText = await response.text();
      const parsed = extractDateFromHtml(htmlText);
      if(!parsed || !parsed.iso) return;

      cardEl.dataset.updated = parsed.iso;
      const badges = cardEl.querySelector(".badges");
      if(badges){
        badges.innerHTML = renderBadges(parsed.iso === todayISO ? todayISO : parsed.iso);
      }
    }catch(err){
      // zostawiamy "Aktualizacja: —"
    }
  }));
}

function normalizePath(path){
  return "/" + String(path || "").replace(/^\/+|\/+$/g, "") + "/";
}

function ensureExtraCard(arr, extra){
  const wanted = normalizePath(extra.path);
  const exists = arr.some(item => normalizePath(item.path) === wanted);
  if(!exists) arr.push(extra);
}

async function load(){
  const res = await fetch(url("manifest.json") + "?t=" + Date.now(), {cache:"no-store"});
  const data = await res.json();

  const all = Object.values(data)
    .filter(x => (x.group || "").toLowerCase() === "analizy-stat-tech");

  const waluty = [];
  const zboza  = [];
  const sruty  = [];
  const energia= [];
  const wskazniki = [];

  all.forEach(r=>{
    const sec = (r.section || "").toLowerCase();
    if(sec === "waluty") waluty.push(r);
    else if(sec === "zboża" || sec === "zboza") zboza.push(r);
    else if(sec === "śruty" || sec === "sruty") sruty.push(r);
    else if(sec === "energia") energia.push(r);
    else if(sec === "wskaźniki" || sec === "wskazniki") wskazniki.push(r);
  });

  /* dodane bezpośrednio w kodzie, bez zmian w manifest.json */
  ensureExtraCard(energia, {
    name: "Ropa",
    description: "Analiza statystyczno-techniczna rynku ropy.",
    path: "/ropa/",
    updated: ""
  });

  ensureExtraCard(wskazniki, {
    name: "Ratio",
    description: "Analiza relacji cenowych między surowcami i wskaźników względnej wyceny.",
    path: "/ratio/",
    updated: ""
  });

  const sortByDateDesc = (a,b)=>parseUpdated(b.updated)-parseUpdated(a.updated);

  waluty.sort(sortByDateDesc);
  zboza.sort(sortByDateDesc);
  sruty.sort(sortByDateDesc);
  energia.sort(sortByDateDesc);
  wskazniki.sort(sortByDateDesc);

  waluty.forEach(r => document.getElementById("sec-waluty").insertAdjacentHTML("beforeend", card(r)));
  zboza.forEach(r  => document.getElementById("sec-zboza").insertAdjacentHTML("beforeend", card(r)));
  sruty.forEach(r  => document.getElementById("sec-sruty").insertAdjacentHTML("beforeend", card(r)));
  energia.forEach(r=> document.getElementById("sec-energia").insertAdjacentHTML("beforeend", card(r)));
  wskazniki.forEach(r=> document.getElementById("sec-wskazniki").insertAdjacentHTML("beforeend", card(r)));

  await hydrateMissingDates();
}

load();
</script>

</body>
</html>
